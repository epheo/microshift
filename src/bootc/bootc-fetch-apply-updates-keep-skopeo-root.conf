# Workaround for bootc-dev/bootc#1682 (present in bootc 1.16.x): when bootc
# detects it runs under systemd (INVOCATION_ID set) it de-privileges its
# skopeo helper to nobody, but skopeo re-opens bootc's mode-0000 temporary
# --authfile via /proc/self/fd/N and the kernel re-checks permissions on
# reopen — EACCES. Net effect: timed updates always fail on hosts that pull
# the OS image from an authenticated registry (/etc/ostree/auth.json), while
# interactive `bootc upgrade` works. Hiding INVOCATION_ID makes bootc skip
# the privilege drop so the timer behaves like the interactive path. Drop
# this once upstream passes the credentials to skopeo correctly.
[Service]
UnsetEnvironment=INVOCATION_ID
